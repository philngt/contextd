name: Release Package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYINSTALLER_VERSION: '6.11.0'

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Package source zip (legacy artifact + onboarding)
  # ---------------------------------------------------------------------------
  package-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/package-release.sh "$VERSION"

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ -n "${GITHUB_REF_NAME}" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if placeholders remain
        run: |
          if grep -RInE '<owner>|<repo>|<tag>|&lt;org&gt;|&lt;repo&gt;|&lt;tag&gt;' README.md onboarding/*.html; then
            echo "ERROR: Placeholder tokens are not allowed in docs." >&2
            exit 1
          fi

      - name: Upload source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-zip
          path: |
            release/contextd-*.zip
            release/wiki-template-*.zip

  # ---------------------------------------------------------------------------
  # Stage 2: Build standalone binaries
  # ---------------------------------------------------------------------------
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: contextd-linux-x86_64
          - os: macos-15-intel
            asset_name: contextd-darwin-x86_64
          - os: macos-latest
            asset_name: contextd-darwin-arm64
          - os: windows-latest
            asset_name: contextd-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install "pyinstaller==${{ env.PYINSTALLER_VERSION }}"

      - name: Generate version file
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "__version__ = '${VERSION}'" > scripts/_version.py

      - name: Generate manifest
        run: python scripts/generate_manifest.py

      - name: Build binary
        run: pyinstaller --clean contextd.spec

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p release-bin
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/contextd.exe "release-bin/${{ matrix.asset_name }}"
          else
            mv dist/contextd "release-bin/${{ matrix.asset_name }}"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release-bin/${{ matrix.asset_name }}

  # ---------------------------------------------------------------------------
  # Stage 3: Create release with all artifacts + installers
  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [package-source, build-binaries]
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ -n "${GITHUB_REF_NAME}" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate release installer scripts
        run: |
          mkdir -p release
          TAG="${{ steps.tag.outputs.value }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # ── install.sh ──────────────────────────────────────────────
          cat > release/install.sh <<'EOF'
          #!/usr/bin/env sh
          set -eu

          REPO="__REPO__"
          TAG="__TAG__"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Detect platform
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          case "$OS" in
            linux)   PLATFORM="linux" ;;
            darwin)  PLATFORM="darwin" ;;
            *)
              echo "ERROR: Unsupported OS: $OS" >&2
              exit 1
              ;;
          esac

          case "$ARCH" in
            x86_64|amd64)  BINARY="contextd-${PLATFORM}-x86_64" ;;
            arm64|aarch64) BINARY="contextd-${PLATFORM}-arm64" ;;
            *)
              echo "ERROR: Unsupported architecture: $ARCH" >&2
              exit 1
              ;;
          esac

          DOWNLOAD_URL="${BASE_URL}/${BINARY}"

          # Determine install directory
          if [ -w "/usr/local/bin" ] 2>/dev/null; then
            INSTALL_DIR="/usr/local/bin"
          else
            INSTALL_DIR="${HOME}/.local/bin"
            mkdir -p "$INSTALL_DIR"
          fi

          TMPFILE="$(mktemp)"
          trap 'rm -f "$TMPFILE"' EXIT

          echo "Downloading ${BINARY}..."
          if command -v curl >/dev/null 2>&1; then
            curl -fL --retry 3 --connect-timeout 15 "$DOWNLOAD_URL" -o "$TMPFILE"
          elif command -v wget >/dev/null 2>&1; then
            wget -O "$TMPFILE" "$DOWNLOAD_URL"
          else
            echo "ERROR: need curl or wget" >&2
            exit 1
          fi

          chmod +x "$TMPFILE"
          mv "$TMPFILE" "${INSTALL_DIR}/contextd"
          echo "Installed to ${INSTALL_DIR}/contextd"

          if ! command -v contextd >/dev/null 2>&1; then
            echo ""
            echo "WARNING: ${INSTALL_DIR} is not on your PATH."
            echo "Add this to your shell profile:"
            echo "  export PATH=\"${INSTALL_DIR}:\$PATH\""
          fi

          echo "Verify: contextd --version"
          echo ""
          echo "Next:"
          echo "  Pick a knowledge_root directory that contains workspaces/."
          echo "  Generate MCP snippets:"
          echo "    contextd mcp-config --client codex --knowledge-root /path/to/knowledge-root --workspace default"
          echo "  If you downloaded the source zip and want Claude slash commands:"
          echo "    bash scripts/install-to-claude.sh --knowledge-root /path/to/knowledge-root"
          EOF
          perl -pi -e "s#__REPO__#${{ github.repository }}#g; s#__TAG__#${TAG}#g" release/install.sh
          chmod +x release/install.sh

          # ── install.ps1 ─────────────────────────────────────────────
          cat > release/install.ps1 <<'EOF'
          $ErrorActionPreference = 'Stop'

          $repo    = '__REPO__'
          $tag     = '__TAG__'
          $baseUrl = "https://github.com/$repo/releases/download/$tag"
          $binary  = 'contextd-windows-x86_64.exe'
          $url     = "$baseUrl/$binary"

          $installDir = Join-Path $env:USERPROFILE '.contextd' 'bin'
          $exePath    = Join-Path $installDir 'contextd.exe'

          New-Item -ItemType Directory -Path $installDir -Force | Out-Null

          Write-Host "Downloading $binary..."
          Invoke-WebRequest -Uri $url -OutFile $exePath

          # Add to user PATH if missing
          $currentPath = [Environment]::GetEnvironmentVariable('Path', 'User')
          if ($currentPath -notlike "*$installDir*") {
              [Environment]::SetEnvironmentVariable('Path', "$currentPath;$installDir", 'User')
              Write-Host "Added $installDir to your user PATH."
          }

          Write-Host "Installed to $exePath"
          Write-Host "Verify: contextd --version"
          Write-Host ""
          Write-Host "Next:"
          Write-Host "  Pick a knowledge_root directory that contains workspaces/."
          Write-Host "  Generate MCP snippets:"
          Write-Host "    contextd mcp-config --client codex --knowledge-root C:\path\to\knowledge-root --workspace default"
          Write-Host "  If you downloaded the source zip and want Claude slash commands:"
          Write-Host "    bash scripts/install-to-claude.sh --knowledge-root C:\path\to\knowledge-root"
          EOF
          perl -pi -e "s#__REPO__#${{ github.repository }}#g; s#__TAG__#${TAG}#g" release/install.ps1

      - name: Generate checksums
        run: |
          {
            (cd release-artifacts && sha256sum *)
            (cd release && sha256sum install.sh install.ps1)
          } > release/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Release ${{ steps.tag.outputs.value }}
          files: |
            release-artifacts/*
            release/install.sh
            release/install.ps1
            release/SHA256SUMS.txt
