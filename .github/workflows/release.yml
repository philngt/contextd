name: Release Package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/package-release.sh "$VERSION"

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ -n "${GITHUB_REF_NAME}" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Normalize docs placeholders for release
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          REPO="${{ github.repository }}"
          GH_URL="https://github.com/${REPO}"
          RELEASE_URL="${GH_URL}/releases/download/${TAG}"

          perl -pi -e "s#https://github\.com/<owner>/<repo>#${GH_URL}#g" README.md onboarding/*.html
          perl -pi -e "s#https://github\.com/&lt;org&gt;/&lt;repo&gt;/releases/download/&lt;tag&gt;#${RELEASE_URL}#g" onboarding/*.html
          perl -pi -e "s#https://github\.com/<owner>/<repo>/releases/download/<tag>#${RELEASE_URL}#g" README.md

      - name: Fail if placeholders remain
        run: |
          if grep -RInE '<owner>|<repo>|<tag>|&lt;org&gt;|&lt;repo&gt;|&lt;tag&gt;' README.md onboarding/*.html; then
            echo "ERROR: Placeholder tokens remain after normalization." >&2
            exit 1
          fi

      - name: Generate release installer scripts
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          ZIP_URL="${BASE_URL}/wiki-template-latest.zip"

          cat > release/install.sh <<EOF
          #!/usr/bin/env sh
          set -eu
          tmpdir="$(mktemp -d 2>/dev/null || mktemp -d -t wiki-install)"
          zip_path="$tmpdir/wiki-template.zip"
          extract_dir="$tmpdir/extract"
          trap 'rm -rf "$tmpdir"' EXIT
          mkdir -p "$extract_dir"

          if command -v curl >/dev/null 2>&1; then
            curl -fL --retry 3 --connect-timeout 15 "$ZIP_URL" -o "$zip_path"
          elif command -v wget >/dev/null 2>&1; then
            wget -O "$zip_path" "$ZIP_URL"
          else
            echo "ERROR: need curl or wget" >&2
            exit 1
          fi

          if ! command -v unzip >/dev/null 2>&1; then
            echo "ERROR: need unzip" >&2
            exit 1
          fi

          unzip -q "$zip_path" -d "$extract_dir"
          repo_root="$extract_dir/wiki-template"
          if [ ! -f "$repo_root/scripts/install-to-claude.sh" ]; then
            echo "ERROR: invalid artifact structure" >&2
            exit 1
          fi

          (cd "$repo_root" && sh scripts/install-to-claude.sh)
          echo "Done. Verify: cat ~/.claude/wiki-global.json"
          EOF

          cat > release/install.ps1 <<EOF
          $ErrorActionPreference = 'Stop'
          $zipUrl = '${ZIP_URL}'
          $tmpDir = Join-Path $env:TEMP ("wiki-install-" + [guid]::NewGuid().ToString("N"))
          $zipPath = Join-Path $tmpDir "wiki-template.zip"
          $extractDir = Join-Path $tmpDir "extract"
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null

          try {
            Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath
            Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force
            $repoRoot = Join-Path $extractDir "wiki-template"
            $installer = Join-Path $repoRoot "scripts/install-to-claude.sh"
            if (-not (Test-Path $installer)) { throw "Invalid artifact structure" }
            $bashCmd = Get-Command bash -ErrorAction SilentlyContinue
            if (-not $bashCmd) { throw "bash not found. Install Git Bash or WSL, then run again." }
            Push-Location $repoRoot
            try { & bash "scripts/install-to-claude.sh" } finally { Pop-Location }
            Write-Host "Done. Verify: type $env:USERPROFILE\.claude\wiki-global.json"
          } finally {
            if (Test-Path $tmpDir) { Remove-Item -Recurse -Force $tmpDir }
          }
          EOF

          chmod +x release/install.sh

      - name: Generate checksums
        run: |
          sha256sum release/wiki-template-*.zip release/install.sh release/install.ps1 > release/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Release ${{ steps.tag.outputs.value }}
          files: |
            release/wiki-template-*.zip
            release/install.sh
            release/install.ps1
            release/SHA256SUMS.txt
