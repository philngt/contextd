name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run test_lint_wiki
        run: python scripts/test_lint_wiki.py

      - name: Run test_atomic_write
        run: python scripts/test_atomic_write.py

      - name: Run test_detect_repetition
        run: python scripts/test_detect_repetition.py

      - name: Run wiki lint
        run: python scripts/lint-wiki.py --all-workspaces --wiki-root .
